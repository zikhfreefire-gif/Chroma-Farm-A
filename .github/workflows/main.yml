name: Chroma-Hub-Docker-Farm
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  android-farm:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Launching Docker Android (No-GPU)
        run: |
          # รัน Android Emulator ผ่าน Docker (ตัวนี้เสถียรสุดบน GitHub)
          docker run -d -p 6080:6080 -p 5554:5554 -p 5555:5555 \
          --device /dev/kvm --name chroma-android \
          budtmo/docker-android:emulator_11.0
          
          # ติดตั้ง tmate เพื่อเจาะท่อ
          sudo apt update && sudo apt install -y tmate
          
      - name: 🔗 Connect Tunnel & Discord Alert
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          SSH_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          
          # ส่งลิงก์เข้า Discord
          curl -H "Content-Type: application/json" -d "{\"content\": \"🚀 **[Chroma Hub]** ระบบ Docker Android พร้อมแล้ว BOSS!\n🔗 **SSH เพื่อดู Link Web:** \`$SSH_LINK\`\n🌐 **วิธีเข้า:** เข้าไปที่พอร์ต 6080 ใน Browser ครับ\"}" ${{ secrets.DISCORD_WEBHOOK }}
          
          # รันยาว 6 ชม.
          sleep 21600
