name: Chroma-Hub-Final-Fix
on:
  workflow_dispatch:

jobs:
  check-system:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Start Clean Tunnel
        run: |
          # ติดตั้งแค่ tmate เพื่อให้ Boss เข้าไปคุมเครื่องเอง
          sudo apt update && sudo apt install -y tmate
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          SSH_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          
          # ส่งลิงก์เข้า Discord
          curl -H "Content-Type: application/json" -d "{\"content\": \"✅ **[Chroma Hub]** ล้างเครื่องสำเร็จ! \n🔗 **SSH:** \`$SSH_LINK\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
          
          # ปล่อยให้เครื่องรันรอ Boss 6 ชม.
          sleep 21600
